server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: любые маршруты отдаём в index.html, чтобы работал React Router
    # (прямые ссылки вроде /rooms/5 не давали 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэшируем статические ассеты подольше.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
